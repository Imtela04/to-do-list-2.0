<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do</title>
  <link rel="stylesheet" href="/src/styles.css">
  <script type="module" src="/src/darkmode.js"></script>
</head>
<body>
  <header class="hero">
    <h1 id="greeting">👋 Hello</h1>
    <p id="subtext">Make today count!</p>
    <div id = "digital-clock">Loading...</div>
    <div id="calendar"></div>
    
  </header>
  

  <div class="user-info">
    
    <span id="user-info"></span>
    <div>
      <button id="dark-toggle">🌙</button>
    </div>
    
    <button style="background-color:rgb(238, 124, 124); border-radius:50px; padding:5px 10px; border: none;cursor:pointer" onclick="logout()">Logout</button>  
  </div>

  <div class="tasks-container" id="tasks-container"></div>

  <button onclick="showAddForm()">+</button>
  <div id="add-form" style="display:none;">
    <input type="text" id="new-task-title" placeholder="Task title">
    <button onclick="handleAdd()">Save</button>
    <button onclick="hideAddForm()">Cancel</button>
  </div>

 
  
  <script type="module">
    import { logout, getTasks, addTask, updateTaskTitle, updateTaskDescription, updateTaskDeadline, updateTaskCategory, toggleTask, deleteTask } from "/src/api.js";
    // Guard
    if (!localStorage.getItem("access_token")) {
      window.location.href = "/login.html";
    }
    //clock
    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString();
      document.getElementById('digital-clock').innerText = timeString;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Greeting
    function updateGreeting() {
      const h = new Date().getHours();
      const parts =
        h >= 5  && h < 12 ? { emoji: "🌅", text: "Good Morning",   sub: "Fresh start. Let's get it!" } :
        h >= 12 && h < 16 ? { emoji: "🌤️", text: "Good Afternoon", sub: "Keep up the momentum!" } :
        h >= 16 && h < 20 ? { emoji: "🌇", text: "Good Evening",   sub: "You're almost there!" } :
                            { emoji: "🌙", text: "Good Night",     sub: "Recharge for tomorrow." };
      document.getElementById("greeting").innerHTML = `${parts.emoji} ${parts.text}`;
      document.getElementById("subtext").innerText = parts.sub;
    }
   // Dark mode toggle
    import { initDarkMode } from "/src/darkmode.js";

    // remove your old toggleDark function and dark-toggle event listener
    initDarkMode("dark-toggle");
    // Render
    function renderTasks(tasks) {
        const container = document.getElementById("tasks-container");
        const isDark = document.body.classList.contains("dark");
        container.innerHTML = tasks.map((task, i) => `
            <div class="task-card ${!isDark ? (i % 2 === 0 ? 'yellow' : 'purple') : (i % 2 === 0 ? 'blue' : 'purple')}" onclick="handleCardClick(this)">
                <div class="task-title ${task.completed ? 'done' : ''}">${task.title}</div>
                <div class="task-actions">
                    <button onclick="event.stopPropagation(); handleToggle(${task.id})">
                        ${task.completed ? '↩️' : '✅'}
                    </button>
                    <button onclick="event.stopPropagation(); handleEdit(${task.id}, '${task.title.replace(/'/g, "\\'")}', '${(task.description||'').replace(/'/g, "\\'")}', '${task.deadline||''}', '${task.category||''}')">✏️</button>
                    <button onclick="event.stopPropagation(); handleDelete(${task.id})">🗑️</button>
                </div>
                <div class="task-preview">
                    <p>📝 ${task.description || 'No description'}</p>
                    <p>⏰ ${task.deadline ? new Date(task.deadline).toLocaleString() : 'No deadline'}</p>
                    <p>🏷️ ${task.category || 'No category'}</p>
                </div>
            </div>
        `).join("");
    }
    window.handleCardClick = (card) => {
        card.classList.toggle("clicked");
    }
    function user() {
        const token = localStorage.getItem("access_token");
        if (!token) return null;
        try {
            const payload = JSON.parse(atob(token.split(".")[1]));
            return { username: payload.sub };
        } catch {
            return null;
        }
    }
    function renderCalendar() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const today = now.getDate();

        const monthNames = ["January","February","March","April","May","June",
                            "July","August","September","October","November","December"];

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        let html = `
            <div class="calendar">
                <div class="calendar-header">${monthNames[month]} ${year}</div>
                <div class="calendar-grid">
                    <span>Su</span><span>Mo</span><span>Tu</span>
                    <span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        `;

        // Empty cells before first day
        for (let i = 0; i < firstDay; i++) {
            html += `<span></span>`;
        }

        // Day cells
        for (let d = 1; d <= daysInMonth; d++) {
            html += `<span class="${d === today ? 'today' : ''}">${d}</span>`;
        }

        html += `</div></div>`;
        document.getElementById("calendar").innerHTML = html;
    }
    const u = user();
    if (u) document.getElementById("user-info").textContent = `Logged in as ${u.username}`;

    async function refresh() {
      const tasks = await getTasks();
      if (tasks) renderTasks(tasks);
    }

    // Handlers — exposed to window for inline onclick
    window.logout = logout;

    window.handleAdd = async () => {
      const title = document.getElementById("new-task-title").value.trim();
      

      if (!title) return;
      await addTask(title);
      document.getElementById("new-task-title").value = "";
      hideAddForm();
      
      refresh();

    };

    window.handleToggle = async (id) => {
        await toggleTask(id);       // no need to pass completed — backend flips it
        refresh();
    };

    window.handleEdit = async (id, currentTitle, currentDescription, currentDeadline, currentCategory) => {
    const newTitle       = prompt("Edit task title:", currentTitle);
    const newDescription = prompt("Edit description:", currentDescription);
    const newDeadline    = prompt("Edit deadline (YYYY-MM-DDTHH:MM):", currentDeadline ? new Date(currentDeadline).toISOString().slice(0, 16) : "");
    const newCategory    = prompt("Edit category:", currentCategory);

    // If user hit Cancel on every prompt, do nothing
    if (newTitle === null && newDescription === null && newDeadline === null && newCategory === null) return;

    if (newTitle       !== null && newTitle       !== currentTitle)       await updateTaskTitle(id, newTitle);
    if (newDescription !== null && newDescription !== currentDescription) await updateTaskDescription(id, newDescription);
    if (newDeadline    !== null && newDeadline    !== currentDeadline)    await updateTaskDeadline(id, newDeadline);
    if (newCategory    !== null && newCategory    !== currentCategory)    await updateTaskCategory(id, newCategory);

    refresh();
};

    window.handleDelete = async (id) => {
      await deleteTask(id);
      refresh();
    };


    window.showAddForm  = () => window.location.href="/add.html";
    window.hideAddForm  = () => document.getElementById("add-form").style.display = "none";

    // Init
    renderCalendar();   
    updateGreeting();
    setInterval(updateGreeting, 60_000);
    refresh();
  </script>
</body>
</html>
